<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FLUXION</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* 背景 */

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#00ffd522,transparent 30%),
radial-gradient(circle at bottom right,#00aaff22,transparent 30%);
z-index:-1;
}

/* 顶部 */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
backdrop-filter:blur(20px);
background:#08101fcc;
border-bottom:1px solid #ffffff10;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:42px;
font-weight:bold;
background:linear-gradient(90deg,#00ffd5,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu{
display:flex;
gap:40px;
align-items:center;
}

.menu a{
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
color:#00ffd5;
}

/* 语言按钮 */

.lang-btn{
padding:12px 22px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#00ffd5,#00aaff);
font-weight:bold;
cursor:pointer;
font-size:15px;
}

/* HERO */

.hero{
min-height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:0 10%;
}

.hero-box{
max-width:1100px;
}

.hero h1{
font-size:82px;
line-height:1.1;
font-weight:900;
margin-bottom:30px;
}

.highlight{
background:linear-gradient(90deg,#00ffd5,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:26px;
color:#cfd8e3;
line-height:1.8;
margin-bottom:50px;
}

/* 按钮 */

.btns{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.btn{
padding:18px 42px;
border-radius:18px;
text-decoration:none;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.btn-main{
background:linear-gradient(90deg,#00ffd5,#00aaff);
color:black;
}

.btn-main:hover{
transform:translateY(-5px);
box-shadow:0 0 25px #00ffd577;
}

.btn-dark{
background:#101826;
border:1px solid #ffffff15;
color:white;
}

.btn-dark:hover{
transform:translateY(-5px);
border-color:#00ffd5;
}

/* 服务 */

.services{
padding:100px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#0d1628cc;
border:1px solid #ffffff10;
border-radius:24px;
padding:40px;
backdrop-filter:blur(20px);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:#00ffd5;
box-shadow:0 0 30px #00ffd522;
}

.card h3{
font-size:28px;
margin-bottom:20px;
}

.card p{
font-size:18px;
line-height:1.8;
color:#cfd8e3;
}

/* 手机 */

@media(max-width:768px){

.hero h1{
font-size:52px;
}

.hero p{
font-size:20px;
}

.menu{
gap:20px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<!-- 顶部 -->

<div class="nav">

<div class="logo">
FLUXION
</div>

<div class="menu">

<a href="#" id="nav-home">首页</a>

<a href="#services" id="nav-services">服务</a>

<a href="about.html" id="nav-about">关于</a>

<a href="https://sfw.vc/w1313" target="_blank" id="nav-contact">联系</a>

<button class="lang-btn" onclick="toggleLang()">
EN / 中文
</button>

</div>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-box">

<h1 id="title">
去中心化 AI 算力基础设施网络
</h1>

<p id="desc">
FLUXION 是新一代 Web3 AI 算力基础设施平台，
聚焦 GPU 网络、去中心化计算资源与企业 AI 服务。
</p>

<div class="btns">

<a href="https://sfw.vc/w1313"
target="_blank"
class="btn btn-main"
id="btn-contact">
立即联系
</a>

<a href="about.html"
class="btn btn-dark"
id="btn-whitepaper">
白皮书
</a>

</div>

</div>

</section>

<!-- 服务 -->

<section class="services" id="services">

<div class="card">

<h3 id="card1-title">
GPU Compute
</h3>

<p id="card1-desc">
提供高性能 GPU 云计算与 AI 推理服务。
</p>

</div>

<div class="card">

<h3 id="card2-title">
Web3 Infrastructure
</h3>

<p id="card2-desc">
构建去中心化 AI 算力协同网络。
</p>

</div>

<div class="card">

<h3 id="card3-title">
AI Services
</h3>

<p id="card3-desc">
面向全球企业提供 AI Agent 与 AI 搜索服务。
</p>

</div>

</section>

<script>

let isCN=true;

function toggleLang(){

if(isCN){

document.getElementById("title").innerHTML=
"Decentralized AI Compute Infrastructure Network";

document.getElementById("desc").innerHTML=
"FLUXION is a next-generation Web3 AI compute infrastructure platform focused on GPU networks, decentralized compute resources and enterprise AI services.";

document.getElementById("btn-contact").innerHTML=
"Contact Now";

document.getElementById("btn-whitepaper").innerHTML=
"Whitepaper";

document.getElementById("nav-home").innerHTML=
"Home";

document.getElementById("nav-services").innerHTML=
"Services";

document.getElementById("nav-about").innerHTML=
"About";

document.getElementById("nav-contact").innerHTML=
"Contact";

document.getElementById("card1-desc").innerHTML=
"High performance GPU cloud computing and AI inference services.";

document.getElementById("card2-desc").innerHTML=
"Building decentralized AI compute collaboration networks.";

document.getElementById("card3-desc").innerHTML=
"AI Agent and AI search services for global enterprises.";

isCN=false;

}else{

location.reload();

}

}

</script>

</body>
</html>
